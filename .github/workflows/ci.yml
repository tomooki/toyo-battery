name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-type:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Sync dev deps
        run: uv sync --all-extras --dev
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Mypy
        run: uv run mypy

  test:
    name: Test (py${{ matrix.python }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}
      - name: Sync deps
        run: uv sync --all-extras --dev --python ${{ matrix.python }}
      - name: Pytest
        run: uv run --python ${{ matrix.python }} pytest --cov=echemplot --cov-report=term-missing

  build:
    name: Build sdist+wheel
    runs-on: ubuntu-latest
    needs: [lint-type, test]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Build
        run: uv build
      - name: Assert pure-Python wheel
        shell: bash
        run: |
          set -e
          wheels=$(ls dist/*.whl)
          for w in $wheels; do
            echo "Checking $w"
            case "$w" in
              *-py3-none-any.whl) echo "OK: $w is pure-Python";;
              *) echo "FAIL: $w is not py3-none-any"; exit 1;;
            esac
          done
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
