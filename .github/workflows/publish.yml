name: Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: Build sdist+wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Verify tag matches pyproject version
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -e
          tag="${GITHUB_REF_NAME#v}"
          pyver=$(uv run --with tomli --python 3.12 python -c "import tomli, pathlib; print(tomli.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          if [ "$tag" != "$pyver" ]; then
            echo "FAIL: tag $GITHUB_REF_NAME does not match pyproject version $pyver"
            exit 1
          fi
          echo "OK: tag $GITHUB_REF_NAME matches pyproject version $pyver"
      - name: Build
        run: uv build
      - name: Assert pure-Python wheel
        shell: bash
        run: |
          set -e
          wheels=$(ls dist/*.whl)
          for w in $wheels; do
            echo "Checking $w"
            case "$w" in
              *-py3-none-any.whl) echo "OK: $w is pure-Python";;
              *) echo "FAIL: $w is not py3-none-any"; exit 1;;
            esac
          done
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/echemplot
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
